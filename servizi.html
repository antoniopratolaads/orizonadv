<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Orizon ADV — Servizi</title>
<meta name="description" content="Orizon ADV - Performance Marketing, Web Development e AI per la crescita del tuo business.">
<link rel="icon" type="image/png" href="/images/logo-orizon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --blue: #3750F7;
  --blue-d: #233BD9;
  --blue-l: #6377FD;
  --blue-s: #9FABFF;
  --blue-ll: #D2D8FF;
  --green: #60E787;
  --green-d: #4CCB70;
  --green-l: #A1F9BA;
  --pink: #FEEAEE;
  --black: #0C1713;
  --black-m: #5A625F;
  --black-l: #A8ACAB;
  --black-ll: #D9D9D9;
  --gray: #F4F5F7;
  --white: #FFFFFF;
  --radius-xl: 28px;
  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  color: var(--black);
  background: var(--white);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

::selection { background: var(--blue-ll); color: var(--blue-d); }

/* ─── NAV ─── */
.nav {
  position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
  padding: 0 56px; height: 72px;
  display: flex; align-items: center; justify-content: space-between;
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  background: rgba(255,255,255,.88);
  border-bottom: 1px solid rgba(55,80,247,.05);
  transition: all .4s;
}
.nav.scrolled { box-shadow: 0 1px 20px rgba(55,80,247,.04); }

.nav-logo {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none;
}
.nav-logo img { height: 28px; width: auto; }
.nav-logo-text {
  font-size: 21px; font-weight: 700; color: var(--blue);
  letter-spacing: -.04em;
}

.nav-links { display: flex; gap: 8px; align-items: center; }
.nav-link {
  padding: 8px 18px; border-radius: 100px;
  font-size: 14px; font-weight: 500; color: var(--black-m);
  text-decoration: none; transition: all .3s;
  border: 1px solid transparent;
}
.nav-link:hover { color: var(--black); background: var(--gray); }
.nav-link.active { color: var(--blue); background: rgba(55,80,247,.05); }
.nav-cta {
  padding: 9px 22px; border-radius: 100px;
  font-size: 14px; font-weight: 600; color: var(--white);
  background: var(--blue); text-decoration: none;
  transition: all .35s; border: none; cursor: pointer;
  font-family: inherit;
}
.nav-cta:hover { background: var(--blue-d); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(55,80,247,.2); }

/* ─── HERO ─── */
.hero {
  padding: 160px 56px 100px;
  max-width: 1440px; margin: 0 auto;
  position: relative;
}
.hero-eyebrow {
  font-size: 12px; font-weight: 700; letter-spacing: .2em;
  text-transform: uppercase; color: var(--blue);
  margin-bottom: 24px;
  display: flex; align-items: center; gap: 14px;
}
.hero-eyebrow::before {
  content: ''; width: 36px; height: 2px;
  background: linear-gradient(90deg, var(--green), var(--blue));
  border-radius: 1px;
}
.hero h1 {
  font-size: clamp(40px, 5.2vw, 72px);
  font-weight: 700; letter-spacing: -.045em;
  line-height: 1.02; margin-bottom: 28px;
  max-width: 800px;
}
.hero h1 em {
  font-style: normal;
  background: linear-gradient(135deg, var(--blue), var(--blue-l));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-desc {
  font-size: 19px; line-height: 1.75; color: var(--black-m);
  max-width: 560px; font-weight: 400;
}
.hero-desc strong { color: var(--black); font-weight: 600; }

.hero-float {
  position: absolute; right: 56px; top: 200px;
  width: 340px; height: 340px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, var(--blue-ll), rgba(55,80,247,.04) 70%);
  filter: blur(60px);
  pointer-events: none;
  animation: floatBlob 8s ease-in-out infinite alternate;
}
@keyframes floatBlob {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(-20px, 30px) scale(1.1); }
}

/* ─── STICKY ANCHORS ─── */
.anchors {
  position: sticky; top: 72px; z-index: 100;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(55,80,247,.05);
  padding: 0 56px;
}
.anchors-inner {
  max-width: 1440px; margin: 0 auto;
  display: flex; gap: 0;
}
.anchor-btn {
  padding: 18px 28px;
  font-size: 14px; font-weight: 600;
  color: var(--black-l); cursor: pointer;
  border: none; background: none;
  font-family: inherit; position: relative;
  transition: all .3s ease;
  white-space: nowrap;
}
.anchor-btn:hover { color: var(--black-m); }
.anchor-btn.active { color: var(--blue); }
.anchor-btn.active::after {
  content: ''; position: absolute;
  bottom: 0; left: 20px; right: 20px;
  height: 2.5px; background: var(--blue);
  border-radius: 2px 2px 0 0;
}

/* ─── SERVICE SECTION ─── */
.svc {
  padding: 120px 56px;
  max-width: 1440px; margin: 0 auto;
  scroll-margin-top: 150px;
}
.svc-grid {
  display: grid;
  grid-template-columns: 1fr 440px;
  gap: 72px;
  align-items: start;
}

/* Left column */
.svc-number {
  font-size: 110px; font-weight: 700;
  letter-spacing: -.06em; line-height: .8;
  margin-bottom: 28px;
  -webkit-text-fill-color: transparent;
  -webkit-text-stroke: 1.5px var(--blue-ll);
  opacity: .6;
}
.svc-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 14px; border-radius: 100px;
  font-size: 11px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  margin-bottom: 16px;
}
.svc-title {
  font-size: clamp(30px, 3.6vw, 48px);
  font-weight: 700; letter-spacing: -.035em;
  line-height: 1.08; margin-bottom: 24px;
}
.svc-desc {
  font-size: 17px; line-height: 1.8;
  color: var(--black-m); margin-bottom: 36px;
  max-width: 540px;
}
.svc-desc strong { color: var(--black); font-weight: 600; }

/* Callout box */
.callout {
  background: var(--gray); border-radius: var(--radius-lg);
  padding: 28px 32px; margin-bottom: 36px;
  border-left: 3px solid var(--blue);
  position: relative;
}
.callout p {
  font-size: 15px; line-height: 1.75; color: var(--black-m);
}
.callout strong { color: var(--blue); font-weight: 700; }

/* Channel pills */
.pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 36px; }
.pill {
  padding: 7px 16px; border-radius: 100px;
  font-size: 13px; font-weight: 600;
  border: 1px solid rgba(55,80,247,.08);
  color: var(--black-m); background: var(--white);
  transition: all .3s ease; cursor: default;
}
.pill:hover {
  border-color: var(--blue); color: var(--blue);
  background: rgba(55,80,247,.03);
}

/* Feature rows */
.features { display: flex; flex-direction: column; gap: 18px; margin-bottom: 36px; }
.feat {
  display: flex; gap: 16px; align-items: flex-start;
}
.feat-icon {
  width: 36px; height: 36px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 15px; font-weight: 700; color: white;
}
.feat h4 { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.feat p { font-size: 13px; color: var(--black-m); line-height: 1.55; }

/* Revenue sharing dark card */
.rs-card {
  background: var(--black); border-radius: var(--radius-xl);
  padding: 36px 36px; position: relative; overflow: hidden;
  margin-top: 8px;
}
.rs-card::before {
  content: ''; position: absolute;
  width: 240px; height: 240px; border-radius: 50%;
  background: radial-gradient(circle, rgba(96,231,135,.12), transparent 70%);
  top: -100px; right: -80px; pointer-events: none;
}
.rs-card::after {
  content: ''; position: absolute;
  width: 160px; height: 160px; border-radius: 50%;
  background: radial-gradient(circle, rgba(55,80,247,.1), transparent 70%);
  bottom: -60px; left: -40px; pointer-events: none;
}
.rs-tag {
  display: inline-block; padding: 5px 14px; border-radius: 100px;
  background: rgba(96,231,135,.1); color: var(--green);
  font-size: 10px; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; margin-bottom: 16px;
}
.rs-card h3 {
  font-size: 22px; font-weight: 700; color: var(--white);
  margin-bottom: 12px; letter-spacing: -.02em;
  position: relative;
}
.rs-card > p {
  font-size: 14px; color: rgba(255,255,255,.5);
  line-height: 1.75; position: relative;
}
.rs-card strong { color: var(--green); font-weight: 700; }

/* ─── SIDE PANELS ─── */
.side-panel {
  background: var(--gray); border-radius: var(--radius-xl);
  overflow: hidden; border: 1px solid rgba(55,80,247,.03);
  position: sticky; top: 160px;
}
.sp-head {
  padding: 24px 28px 18px;
  border-bottom: 1px solid rgba(55,80,247,.05);
}
.sp-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: .15em;
  text-transform: uppercase; color: var(--blue); margin-bottom: 4px;
}
.sp-title { font-size: 19px; font-weight: 700; letter-spacing: -.02em; }
.sp-body { padding: 8px; }

/* Case study mini cards */
.cs {
  padding: 20px; border-radius: 16px;
  cursor: pointer; transition: all .35s;
  background: transparent; position: relative;
}
.cs:hover { background: var(--white); box-shadow: 0 4px 24px rgba(55,80,247,.05); }
.cs-top { display: flex; gap: 14px; align-items: center; margin-bottom: 14px; }
.cs-dot {
  width: 42px; height: 42px; border-radius: 12px;
  flex-shrink: 0; display: flex; align-items: center;
  justify-content: center; font-size: 15px; font-weight: 700; color: white;
}
.cs-name { font-size: 15px; font-weight: 700; }
.cs-tag { font-size: 11px; color: var(--black-l); font-weight: 500; }
.cs-kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.cs-kpi { background: var(--white); border-radius: var(--radius-sm); padding: 10px 14px; }
.cs-kpi-v { font-size: 19px; font-weight: 700; color: var(--green-d); }
.cs-kpi-l {
  font-size: 9.5px; color: var(--black-l); font-weight: 600;
  letter-spacing: .05em; text-transform: uppercase; margin-top: 2px;
}
.cs-desc { font-size: 13px; color: var(--black-m); line-height: 1.55; }
.cs-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 700; color: var(--blue);
  margin-top: 10px; text-decoration: none; transition: gap .3s;
}
.cs-link:hover { gap: 10px; }
.cs-sep { height: 1px; background: rgba(55,80,247,.05); margin: 2px 20px; }

/* Micro tag pills inside case studies */
.cs-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
.cs-micro-tag {
  font-size: 10px; font-weight: 700; padding: 3px 8px;
  border-radius: 100px;
}
.cs-rs-tag {
  font-size: 10px; font-weight: 700; padding: 3px 10px;
  border-radius: 100px; background: rgba(96,231,135,.1);
  color: var(--green-d); margin-top: 6px; display: inline-block;
}

/* Site preview cards */
.site-card {
  margin: 8px; border-radius: 18px; overflow: hidden;
  border: 1px solid rgba(55,80,247,.04);
  transition: all .4s; cursor: pointer; background: var(--white);
}
.site-card:hover {
  border-color: var(--blue);
  box-shadow: 0 12px 36px rgba(55,80,247,.07);
  transform: translateY(-2px);
}
.site-card-visual {
  width: 100%; height: 160px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 6px;
}
.site-card-visual-name {
  font-size: 26px; font-weight: 700; letter-spacing: -.02em;
}
.site-card-visual-url {
  font-size: 11px; font-weight: 600; opacity: .7;
}
.site-card-body { padding: 16px 20px; }
.site-card-body h4 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.site-card-body p { font-size: 12px; color: var(--black-m); line-height: 1.5; }
.site-card-body .url-link {
  font-size: 11px; color: var(--blue); font-weight: 600;
  margin-top: 6px; display: block; text-decoration: none;
}

/* SaaS product cards */
.saas {
  padding: 24px; border-radius: 18px; margin: 8px;
  background: var(--white); border: 1px solid rgba(55,80,247,.04);
  transition: all .4s; cursor: default;
}
.saas:hover {
  border-color: var(--blue);
  box-shadow: 0 12px 36px rgba(55,80,247,.06);
  transform: translateY(-2px);
}
.saas-badge {
  display: inline-block; padding: 4px 12px; border-radius: 100px;
  font-size: 10px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; margin-bottom: 14px;
}
.saas h3 { font-size: 17px; font-weight: 700; letter-spacing: -.01em; margin-bottom: 8px; }
.saas > p { font-size: 13px; color: var(--black-m); line-height: 1.65; margin-bottom: 16px; }
.saas-feats { display: flex; flex-direction: column; gap: 6px; }
.saas-f {
  font-size: 12px; font-weight: 600; color: var(--black-m);
  display: flex; align-items: center; gap: 8px;
}
.saas-f::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%;
  background: var(--blue); flex-shrink: 0;
}
.saas-btn {
  margin-top: 16px; padding: 10px 22px; border-radius: 100px;
  border: 1.5px solid var(--blue); background: transparent;
  color: var(--blue); font-family: inherit; font-size: 13px;
  font-weight: 700; cursor: pointer; transition: all .3s;
}
.saas-btn:hover { background: var(--blue); color: white; }

/* ─── DIVIDER ─── */
.divider {
  max-width: 1440px; margin: 0 auto; padding: 0 56px;
}
.divider-line {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(55,80,247,.07), transparent);
}

/* ─── CTA BOTTOM ─── */
.cta-section {
  padding: 120px 56px;
  text-align: center;
  position: relative;
}
.cta-section::before {
  content: ''; position: absolute;
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(55,80,247,.04), transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none;
}
.cta-section h2 {
  font-size: clamp(30px, 4vw, 52px);
  font-weight: 700; letter-spacing: -.035em;
  margin-bottom: 18px; position: relative;
}
.cta-section > p {
  font-size: 18px; color: var(--black-m);
  margin-bottom: 40px; max-width: 480px;
  margin-left: auto; margin-right: auto;
  line-height: 1.7; position: relative;
}
.cta-btn {
  padding: 18px 48px; background: var(--blue);
  color: var(--white); border: none; border-radius: 100px;
  font-family: inherit; font-size: 17px; font-weight: 700;
  cursor: pointer; transition: all .4s; position: relative;
}
.cta-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 20px 56px rgba(55,80,247,.22);
  background: var(--blue-d);
}

.cta-contacts {
  margin-top: 48px; display: flex;
  justify-content: center; gap: 36px; flex-wrap: wrap;
  position: relative;
}
.cta-contact {
  font-size: 13px; color: var(--black-l); font-weight: 500;
  text-decoration: none; transition: color .3s;
  display: flex; align-items: center; gap: 6px;
}
.cta-contact:hover { color: var(--blue); }
.cta-contact svg { width: 14px; height: 14px; opacity: .5; }

/* ─── FOOTER ─── */
.footer {
  padding: 40px 56px;
  border-top: 1px solid rgba(55,80,247,.04);
  display: flex; align-items: center; justify-content: space-between;
  max-width: 1440px; margin: 0 auto;
}
.footer-left { font-size: 12px; color: var(--black-l); font-weight: 500; }
.footer-links { display: flex; gap: 20px; }
.footer-link {
  font-size: 12px; color: var(--black-l); text-decoration: none;
  font-weight: 500; transition: color .3s;
}
.footer-link:hover { color: var(--blue); }

/* ─── REVEAL ANIMATION ─── */
.rv {
  opacity: 0; transform: translateY(20px);
  transition: opacity .65s cubic-bezier(.22,1,.36,1),
              transform .65s cubic-bezier(.22,1,.36,1);
}
.rv.v { opacity: 1; transform: translateY(0); }

/* ─── RESPONSIVE ─── */
@media (max-width: 1100px) {
  .nav { padding: 0 32px; }
  .hero { padding: 140px 32px 80px; }
  .hero-float { display: none; }
  .svc { padding: 80px 32px; }
  .svc-grid { grid-template-columns: 1fr; gap: 48px; }
  .side-panel { position: static; }
  .anchors { padding: 0 32px; }
  .svc-number { font-size: 80px; }
  .cta-section { padding: 80px 32px; }
  .divider { padding: 0 32px; }
  .footer { padding: 32px 32px; }
}
@media (max-width: 768px) {
  .nav { padding: 0 20px; height: 64px; }
  .nav-links { display: none; }
  .hero { padding: 110px 20px 60px; }
  .svc { padding: 64px 20px; }
  .anchors { padding: 0 20px; overflow-x: auto; }
  .anchor-btn { padding: 14px 18px; font-size: 13px; }
  .svc-number { font-size: 60px; }
  .cta-section { padding: 64px 20px; }
  .cta-contacts { gap: 20px; }
  .divider { padding: 0 20px; }
  .footer { padding: 24px 20px; flex-direction: column; gap: 16px; text-align: center; }
}
</style>
</head>
