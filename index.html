<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Orizon ADV — Performance Marketing, Web & AI Development</title>
<meta name="description" content="Orizon ADV - Performance Marketing, Web Development e AI per la crescita del tuo business.">
<link rel="icon" type="image/png" href="/images/logo-orizon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--blue:#3750F7;--blue-d:#233BD9;--blue-l:#6377FD;--blue-s:#9FABFF;--blue-ll:#D2D8FF;--green:#60E787;--green-d:#4CCB70;--green-l:#A1F9BA;--pink:#FEEAEE;--black:#0C1713;--black-m:#5A625F;--black-l:#A8ACAB;--black-ll:#D9D9D9;--gray:#F4F5F7;--white:#FFFFFF}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'IBM Plex Sans',sans-serif;color:var(--black);background:var(--white);overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
::selection{background:var(--blue-ll);color:var(--blue-d)}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:0 56px;height:72px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);background:rgba(255,255,255,.88);border-bottom:1px solid rgba(55,80,247,.05);transition:all .4s}
.nav.scrolled{box-shadow:0 1px 20px rgba(55,80,247,.04)}
.nav-logo{font-size:21px;font-weight:700;color:var(--blue);letter-spacing:-.04em;text-decoration:none}
.nav-links{display:flex;gap:8px;align-items:center}
.nav-link{padding:8px 18px;border-radius:100px;font-size:14px;font-weight:500;color:var(--black-m);text-decoration:none;transition:all .3s;border:1px solid transparent}
.nav-link:hover{color:var(--black);background:var(--gray)}
.nav-link.active{color:var(--blue);background:rgba(55,80,247,.05)}
.nav-cta{padding:9px 22px;border-radius:100px;font-size:14px;font-weight:600;color:var(--white);background:var(--blue);text-decoration:none;transition:all .35s;border:none;cursor:pointer;font-family:inherit}
.nav-cta:hover{background:var(--blue-d);transform:translateY(-1px);box-shadow:0 8px 24px rgba(55,80,247,.2)}

/* ── HERO ── */
.hero{padding:160px 56px 80px;max-width:1440px;margin:0 auto;position:relative}
.hero-eyebrow{font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin-bottom:24px;display:flex;align-items:center;gap:14px}
.hero-eyebrow::before{content:'';width:36px;height:2px;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:1px}
.hero h1{font-size:clamp(42px,5.5vw,76px);font-weight:700;letter-spacing:-.05em;line-height:1.02;margin-bottom:28px;max-width:900px}
.hero h1 em{font-style:normal;background:linear-gradient(135deg,var(--blue),var(--blue-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-desc{font-size:19px;line-height:1.75;color:var(--black-m);max-width:560px;margin-bottom:40px}
.hero-desc strong{color:var(--black);font-weight:600}
.hero-actions{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.hero-btn{padding:16px 40px;border-radius:100px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:all .4s;border:none}
.hero-btn-primary{background:var(--blue);color:var(--white)}
.hero-btn-primary:hover{background:var(--blue-d);transform:translateY(-2px);box-shadow:0 16px 48px rgba(55,80,247,.2)}
.hero-btn-secondary{background:transparent;color:var(--black-m);border:1.5px solid var(--black-ll)}
.hero-btn-secondary:hover{border-color:var(--blue);color:var(--blue)}
.hero-float{position:absolute;right:80px;top:180px;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle at 30% 30%,var(--blue-ll),rgba(55,80,247,.03) 70%);filter:blur(70px);pointer-events:none;animation:floatBlob 8s ease-in-out infinite alternate}
@keyframes floatBlob{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-20px,30px) scale(1.1)}}

/* ── CLIENT MARQUEE ── */
.marquee-section{padding:48px 0;border-top:1px solid rgba(55,80,247,.04);border-bottom:1px solid rgba(55,80,247,.04);overflow:hidden}
.marquee-label{text-align:center;font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--black-l);margin-bottom:28px}
.marquee-track{display:flex;animation:marquee 30s linear infinite;width:max-content}
.marquee-track:hover{animation-play-state:paused}
.marquee-item{padding:0 48px;font-size:18px;font-weight:700;color:var(--black-ll);letter-spacing:-.02em;white-space:nowrap;transition:color .3s;cursor:default;display:flex;align-items:center;gap:12px}
.marquee-item:hover{color:var(--black-m)}
.marquee-dot{width:6px;height:6px;border-radius:50%;background:var(--blue-ll);flex-shrink:0}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ── SERVICES ── */
.services{padding:100px 56px;max-width:1440px;margin:0 auto}
.section-eyebrow{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:12px}
.section-eyebrow::before{content:'';width:28px;height:2px;background:var(--green);border-radius:1px}
.section-title{font-size:clamp(28px,3.5vw,44px);font-weight:700;letter-spacing:-.035em;line-height:1.1;margin-bottom:16px}
.section-desc{font-size:17px;color:var(--black-m);line-height:1.7;max-width:520px;margin-bottom:56px}
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.svc-card{padding:36px 32px;border-radius:24px;background:var(--gray);border:1px solid rgba(55,80,247,.03);transition:all .4s;cursor:pointer;position:relative;overflow:hidden}
.svc-card:hover{background:var(--white);border-color:var(--blue);box-shadow:0 16px 48px rgba(55,80,247,.08);transform:translateY(-4px)}
.svc-card-num{font-size:64px;font-weight:700;-webkit-text-fill-color:transparent;-webkit-text-stroke:1px var(--black-ll);line-height:.85;margin-bottom:20px;opacity:.5}
.svc-card:hover .svc-card-num{-webkit-text-stroke-color:var(--blue-ll)}
.svc-card-badge{display:inline-block;padding:4px 12px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px}
.svc-card h3{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:10px}
.svc-card p{font-size:14px;color:var(--black-m);line-height:1.65;margin-bottom:20px}
.svc-card-tags{display:flex;flex-wrap:wrap;gap:6px}
.svc-card-tag{padding:5px 12px;border-radius:100px;font-size:11px;font-weight:600;border:1px solid rgba(55,80,247,.08);color:var(--black-l);background:var(--white)}
.svc-card-arrow{position:absolute;bottom:32px;right:32px;width:36px;height:36px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:white;font-size:16px;opacity:0;transform:translateX(-8px);transition:all .35s}
.svc-card:hover .svc-card-arrow{opacity:1;transform:translateX(0)}

/* ── STATS ── */
.stats{padding:80px 56px;max-width:1440px;margin:0 auto}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.stat{padding:36px 32px;border-radius:24px;background:var(--black);position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;width:120px;height:120px;border-radius:50%;top:-40px;right:-40px;pointer-events:none}
.stat:nth-child(1)::before{background:radial-gradient(circle,rgba(55,80,247,.15),transparent 70%)}
.stat:nth-child(2)::before{background:radial-gradient(circle,rgba(96,231,135,.12),transparent 70%)}
.stat:nth-child(3)::before{background:radial-gradient(circle,rgba(99,119,253,.12),transparent 70%)}
.stat:nth-child(4)::before{background:radial-gradient(circle,rgba(96,231,135,.15),transparent 70%)}
.stat-value{font-size:clamp(32px,3.5vw,48px);font-weight:700;color:var(--white);letter-spacing:-.03em;margin-bottom:6px;position:relative}
.stat-value .accent{color:var(--green)}
.stat-label{font-size:13px;color:rgba(255,255,255,.45);font-weight:500;position:relative}

/* ── CASE STUDIES ── */
.cases{padding:100px 56px;max-width:1440px;margin:0 auto}
.cases-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.case-card-v2{border-radius:24px;overflow:hidden;background:var(--gray);border:1px solid rgba(55,80,247,.03);transition:all .4s;cursor:pointer}
.case-card-v2:hover{border-color:var(--blue);box-shadow:0 16px 48px rgba(55,80,247,.08);transform:translateY(-3px)}
.case-visual{height:200px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.case-visual-name{font-size:32px;font-weight:700;letter-spacing:-.03em}
.case-visual-sub{font-size:12px;font-weight:600}
.case-body{padding:28px}
.case-head{margin-bottom:16px}
.case-brand{font-size:18px;font-weight:700;letter-spacing:-.01em;margin-bottom:2px}
.case-cat{font-size:12px;color:var(--black-l);font-weight:500}
.case-kpis-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.case-kpi{background:var(--white);border-radius:12px;padding:14px 16px}
.case-kpi-v{font-size:22px;font-weight:700;color:var(--green-d);letter-spacing:-.02em}
.case-kpi-l{font-size:10px;color:var(--black-l);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-top:2px}
.case-text{font-size:13px;color:var(--black-m);line-height:1.6;margin-bottom:16px}
.case-link{font-size:12px;font-weight:700;color:var(--blue);text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:gap .3s}
.case-link:hover{gap:10px}

/* ── FOUNDER ── */
.founder{padding:100px 56px;max-width:1440px;margin:0 auto}
.founder-grid{display:grid;grid-template-columns:400px 1fr;gap:64px;align-items:center}
.founder-img{width:100%;aspect-ratio:3/4;border-radius:28px;overflow:hidden;position:relative}
.founder-img-placeholder{width:100%;height:100%;background:linear-gradient(135deg,var(--blue),var(--blue-l));display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.founder-initials{font-size:72px;font-weight:700;color:rgba(255,255,255,.2);letter-spacing:-.04em}
.founder-img-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase}
.founder-content{}
.founder-name{font-size:clamp(24px,2.5vw,32px);font-weight:700;letter-spacing:-.03em;margin-bottom:4px}
.founder-role{font-size:14px;color:var(--blue);font-weight:600;margin-bottom:28px}
.founder-text{font-size:16px;line-height:1.8;color:var(--black-m);margin-bottom:20px}
.founder-text strong{color:var(--black);font-weight:600}
.founder-quote{font-size:18px;font-style:italic;color:var(--black);line-height:1.7;padding-left:20px;border-left:3px solid var(--green);margin-top:28px;font-weight:400}
.founder-socials{display:flex;gap:10px;margin-top:28px}
.founder-social{width:40px;height:40px;border-radius:12px;background:var(--gray);display:flex;align-items:center;justify-content:center;color:var(--black-m);text-decoration:none;transition:all .3s}
.founder-social:hover{background:var(--blue);color:white}
.founder-social svg{width:16px;height:16px}

/* ── TESTIMONIALS ── */
.testimonials{padding:80px 56px 100px;max-width:1440px;margin:0 auto}
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:48px}
.testi{padding:32px;border-radius:24px;background:var(--gray);border:1px solid rgba(55,80,247,.03);transition:all .35s}
.testi:hover{background:var(--white);border-color:rgba(55,80,247,.06);box-shadow:0 8px 32px rgba(55,80,247,.05)}
.testi-stars{font-size:14px;margin-bottom:16px;letter-spacing:2px}
.testi-text{font-size:15px;line-height:1.7;color:var(--black-m);margin-bottom:20px;font-style:italic}
.testi-author{display:flex;gap:12px;align-items:center}
.testi-avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:white;flex-shrink:0}
.testi-name{font-size:14px;font-weight:700}
.testi-company{font-size:12px;color:var(--black-l)}

/* ── CTA ── */
.cta{padding:100px 56px;text-align:center;position:relative}
.cta::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(55,80,247,.04),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.cta h2{font-size:clamp(30px,4vw,52px);font-weight:700;letter-spacing:-.035em;margin-bottom:18px;position:relative}
.cta>p{font-size:18px;color:var(--black-m);margin-bottom:40px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.7;position:relative}
.cta-btn{padding:18px 48px;background:var(--blue);color:var(--white);border:none;border-radius:100px;font-family:inherit;font-size:17px;font-weight:700;cursor:pointer;transition:all .4s;position:relative}
.cta-btn:hover{transform:translateY(-3px);box-shadow:0 20px 56px rgba(55,80,247,.22);background:var(--blue-d)}

/* ── FOOTER ── */
.footer{border-top:1px solid rgba(55,80,247,.04);padding:56px 56px 40px;max-width:1440px;margin:0 auto}
.footer-top{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr 1fr;gap:32px;margin-bottom:48px}
.footer-brand{max-width:280px}
.footer-logo{font-size:20px;font-weight:700;color:var(--blue);letter-spacing:-.04em;margin-bottom:12px}
.footer-tagline{font-size:13px;color:var(--black-l);line-height:1.6;margin-bottom:20px}
.footer-contact-item{font-size:13px;color:var(--black-m);margin-bottom:8px;display:flex;align-items:center;gap:8px;text-decoration:none;transition:color .3s}
.footer-contact-item:hover{color:var(--blue)}
.footer-contact-item svg{width:14px;height:14px;opacity:.5;flex-shrink:0}
.footer-col h4{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--black-l);margin-bottom:16px}
.footer-col a{display:block;font-size:14px;font-weight:500;color:var(--black-m);text-decoration:none;margin-bottom:10px;transition:color .3s}
.footer-col a:hover{color:var(--blue)}
.footer-bottom{padding-top:24px;border-top:1px solid rgba(55,80,247,.04);font-size:12px;color:var(--black-l);font-weight:500;text-align:center}

/* ── DIVIDER ── */
.divider{max-width:1440px;margin:0 auto;padding:0 56px}
.divider-line{height:1px;background:linear-gradient(90deg,transparent,rgba(55,80,247,.07),transparent)}

/* ── REVEAL ── */
.rv{opacity:0;transform:translateY(20px);transition:opacity .65s cubic-bezier(.22,1,.36,1),transform .65s cubic-bezier(.22,1,.36,1)}
.rv.v{opacity:1;transform:translateY(0)}

/* ── RESPONSIVE ── */
@media(max-width:1100px){
.nav{padding:0 32px}.hero{padding:140px 32px 64px}.hero-float{display:none}
.services,.stats,.cases,.founder,.testimonials,.cta{padding-left:32px;padding-right:32px}
.svc-grid{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr 1fr}
.founder-grid{grid-template-columns:1fr;gap:40px}.founder-img{max-width:320px}
.testi-grid{grid-template-columns:1fr}.footer{padding:40px 32px 32px}
.footer-top{grid-template-columns:1fr 1fr;gap:32px}
}
@media(max-width:768px){
.nav{padding:0 20px;height:64px}.nav-links{display:none}
.hero{padding:110px 20px 48px}.hero h1{font-size:clamp(32px,8vw,48px)}
.services,.stats,.cases,.founder,.testimonials,.cta{padding-left:20px;padding-right:20px}
.stats-grid{grid-template-columns:1fr 1fr}.case-card{min-width:300px}
.cases-grid{grid-template-columns:1fr}
.founder-grid{grid-template-columns:1fr}.founder-img{max-width:100%}
.hero-actions{flex-direction:column;align-items:flex-start}
.footer{padding:32px 20px 24px}.footer-top{grid-template-columns:1fr;gap:28px}
.divider{padding:0 20px}
}
</style>
</head>
