<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Orizon ADV — Climando Case Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--blue:#3750F7;--blue-d:#233BD9;--blue-l:#6377FD;--blue-ll:#D2D8FF;--green:#60E787;--green-d:#4CCB70;--black:#0C1713;--black-m:#5A625F;--black-l:#A8ACAB;--black-ll:#D9D9D9;--gray:#F4F5F7;--white:#FFFFFF;--cl:#0369A1;--cl-l:#0EA5E9;--cl-ll:#E0F2FE;--cl-d:#075985;--cl-g:#059669}
*{margin:0;padding:0;box-sizing:border-box}
html,body{scroll-behavior:smooth;overflow-x:hidden;max-width:100vw}
body{font-family:'IBM Plex Sans',sans-serif;color:var(--black);background:var(--white);-webkit-font-smoothing:antialiased}
::selection{background:var(--blue-ll);color:var(--blue-d)}

/* NAV */
.nav{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:0 56px;height:72px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);background:rgba(255,255,255,.88);border-bottom:1px solid rgba(55,80,247,.05);transition:all .4s}
.nav.scrolled{box-shadow:0 1px 20px rgba(55,80,247,.04)}
.nav-logo{font-size:21px;font-weight:700;color:var(--blue);letter-spacing:-.04em;text-decoration:none}
.nav-links{display:flex;gap:8px;align-items:center}
.nav-link{padding:8px 18px;border-radius:100px;font-size:14px;font-weight:500;color:var(--black-m);text-decoration:none;transition:all .3s}
.nav-link:hover{color:var(--black);background:var(--gray)}
.nav-link.active{color:var(--blue);background:rgba(55,80,247,.05)}
.nav-cta{padding:9px 22px;border-radius:100px;font-size:14px;font-weight:600;color:var(--white);background:var(--blue);text-decoration:none;transition:all .35s}
.nav-cta:hover{background:var(--blue-d);transform:translateY(-1px);box-shadow:0 8px 24px rgba(55,80,247,.2)}

/* HERO - PREMIUM */
.cs-hero{position:relative;overflow:hidden;padding:160px 56px 100px;min-height:560px;display:flex;align-items:flex-end;background:#075985}
.cs-hero-bg{position:absolute;inset:0;overflow:hidden}
.cs-hero-bg .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.6;animation:orbFloat 20s ease-in-out infinite}
.orb-1{width:600px;height:600px;background:radial-gradient(circle,#0EA5E9,transparent 70%);top:-200px;right:-100px;animation-delay:0s}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,#059669,transparent 70%);bottom:-100px;left:-50px;animation-delay:-7s}
.orb-3{width:500px;height:500px;background:radial-gradient(circle,#3750F7,transparent 70%);top:50%;left:40%;transform:translate(-50%,-50%);animation-delay:-14s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(30px,-20px) scale(1.05)}50%{transform:translate(-20px,30px) scale(.95)}75%{transform:translate(20px,20px) scale(1.02)}}
.cs-hero-noise{position:absolute;inset:0;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");background-size:200px}
.cs-hero-opattern{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.cs-hero-opattern .o-shape{position:absolute;opacity:0;animation:oFadeIn 1.5s ease-out forwards}
@keyframes oFadeIn{0%{opacity:0;transform:scale(.8)}100%{opacity:var(--o-opacity);transform:scale(1)}}
.cs-hero-content{position:relative;max-width:1440px;width:100%;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:40px}
.cs-hero-text{flex:1}
.cs-hero-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:rgba(255,255,255,.5);text-decoration:none;margin-bottom:40px;transition:color .3s}
.cs-hero-back:hover{color:rgba(255,255,255,.9)}
.cs-hero-sector{font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:12px}
.cs-hero h1{font-size:clamp(42px,6vw,72px);font-weight:700;letter-spacing:-.05em;line-height:1;color:white;margin-bottom:16px}
.cs-hero-sub{font-size:18px;color:rgba(255,255,255,.6);max-width:520px;line-height:1.7}
.cs-hero-logo{width:110px;height:110px;border-radius:24px;background:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:14px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.cs-hero-logo img{width:100%;height:100%;object-fit:contain}

/* KPI STRIP */
.kpi-strip{max-width:1200px;margin:-56px auto 0;padding:0 56px;position:relative;z-index:10}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.kpi-card{background:var(--white);border-radius:20px;padding:28px 24px;box-shadow:0 8px 40px rgba(0,0,0,.06);border:1px solid rgba(55,80,247,.04);text-align:center;transition:all .5s cubic-bezier(.22,1,.36,1)}
.kpi-card:hover{transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,.08)}
.kpi-value{font-size:clamp(26px,3vw,36px);font-weight:700;letter-spacing:-.03em;color:var(--cl);margin-bottom:4px}
.kpi-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--black-l)}

/* SECTION */
.section{max-width:1200px;margin:0 auto;padding:80px 56px}
.section-label{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--cl);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.section-label::before{content:'';width:24px;height:2px;background:var(--cl);border-radius:1px}
.section h2{font-size:clamp(26px,3.5vw,38px);font-weight:700;letter-spacing:-.035em;line-height:1.15;margin-bottom:16px}
.section p{font-size:16px;line-height:1.8;color:var(--black-m);margin-bottom:16px;max-width:760px}
.section p strong{color:var(--black);font-weight:600}

/* DIVIDER */
.divider{max-width:1200px;margin:0 auto;padding:0 56px}
.divider-line{height:1px;background:linear-gradient(90deg,transparent,rgba(55,80,247,.07),transparent)}

/* SCREENSHOT */
.screenshot{max-width:1200px;margin:0 auto 0;padding:0 56px}
.screenshot img{width:100%;display:block;border-radius:16px;border:1px solid rgba(0,0,0,.06);box-shadow:0 4px 24px rgba(0,0,0,.04);transition:transform .6s cubic-bezier(.22,1,.36,1),box-shadow .6s}
.screenshot img:hover{transform:scale(1.01);box-shadow:0 12px 48px rgba(0,0,0,.08)}
.screenshot-caption{padding:12px 0;font-size:13px;color:var(--black-l);font-weight:500}

/* STRATEGY CARDS */
.strat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px}
.strat-card{padding:24px;border-radius:16px;background:var(--gray);border:1px solid rgba(55,80,247,.03);transition:all .5s cubic-bezier(.22,1,.36,1)}
.strat-card:hover{background:var(--white);border-color:rgba(55,80,247,.08);box-shadow:0 8px 32px rgba(0,0,0,.04);transform:translateY(-3px)}
.strat-card-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px}
.strat-card h4{font-size:14px;font-weight:700;margin-bottom:6px;letter-spacing:-.01em}
.strat-card p{font-size:13px;color:var(--black-m);line-height:1.6;margin-bottom:0}

/* TIMELINE */
.timeline{position:relative;padding-left:28px;margin-bottom:32px}
.timeline::before{content:'';position:absolute;left:6px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,var(--cl),var(--cl-l));border-radius:1px}
.timeline-item{position:relative;margin-bottom:32px;transition:all .5s}
.timeline-item:last-child{margin-bottom:0}
.timeline-dot{position:absolute;left:-28px;top:6px;width:14px;height:14px;border-radius:50%;background:var(--cl);border:3px solid var(--white);box-shadow:0 0 0 2px var(--cl);transition:all .3s}
.timeline-item:hover .timeline-dot{transform:scale(1.3);box-shadow:0 0 0 3px var(--cl),0 0 20px rgba(3,105,161,.2)}
.timeline-phase{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cl);margin-bottom:4px}
.timeline-title{font-size:17px;font-weight:700;margin-bottom:4px}
.timeline-desc{font-size:14px;color:var(--black-m);line-height:1.6}

/* BEFORE/AFTER */
.ba-strip{display:grid;grid-template-columns:1fr auto 1fr;gap:0;border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.04);margin-bottom:32px}
.ba-card{padding:36px;text-align:center}
.ba-before{background:#FEE2E2}
.ba-after{background:#D1FAE5}
.ba-arrow{display:flex;align-items:center;justify-content:center;padding:0 24px;background:var(--gray);font-size:28px;color:var(--black-l)}
.ba-label{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
.ba-before .ba-label{color:#DC2626}
.ba-after .ba-label{color:#059669}
.ba-value{font-size:clamp(32px,4vw,44px);font-weight:700;letter-spacing:-.03em}
.ba-before .ba-value{color:#DC2626}
.ba-after .ba-value{color:#059669}
.ba-desc{font-size:13px;color:var(--black-m);margin-top:6px}

/* RESULTS GRID */
.results-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:32px}
.result-card{padding:24px;border-radius:16px;background:var(--gray);border:1px solid rgba(55,80,247,.03);text-align:center;transition:all .5s cubic-bezier(.22,1,.36,1)}
.result-card:hover{background:var(--white);border-color:rgba(55,80,247,.08);box-shadow:0 8px 32px rgba(0,0,0,.04);transform:translateY(-3px)}
.result-card-v{font-size:28px;font-weight:700;letter-spacing:-.02em;color:var(--cl);margin-bottom:4px}
.result-card-l{font-size:11px;color:var(--black-l);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.result-card-d{font-size:12px;color:var(--black-m);margin-top:6px;line-height:1.5}

/* CHANNEL BREAKDOWN */
.channel-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px}
.channel-card{padding:28px;border-radius:20px;background:var(--gray);border:1px solid rgba(55,80,247,.03);transition:all .5s cubic-bezier(.22,1,.36,1)}
.channel-card:hover{background:var(--white);box-shadow:0 8px 32px rgba(0,0,0,.04)}
.channel-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid rgba(0,0,0,.05)}
.channel-logo{height:24px;flex-shrink:0}
.channel-name{font-size:16px;font-weight:700}
.channel-detail{display:flex;justify-content:space-between;padding:8px 0}
.channel-detail-label{font-size:14px;color:var(--black-m)}
.channel-detail-value{font-size:14px;font-weight:700}

/* QUOTE */
.quote-section{background:linear-gradient(135deg,var(--cl),var(--cl-d));padding:64px 56px;position:relative;overflow:hidden}
.quote-section::before{content:'\201C';position:absolute;top:-20px;left:40px;font-size:200px;font-weight:700;color:rgba(255,255,255,.05);line-height:1}
.quote-inner{max-width:1200px;margin:0 auto;position:relative}
.quote-inner p{font-size:20px;line-height:1.8;color:white;font-style:italic;max-width:700px}
.quote-author{margin-top:20px;font-size:14px;font-weight:700;color:rgba(255,255,255,.6)}

/* INFO STRIP */
.info-strip{max-width:1200px;margin:0 auto;padding:0 56px}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.info-card{padding:24px;border-radius:16px;background:var(--gray);border:1px solid rgba(55,80,247,.03)}
.info-card-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--black-l);margin-bottom:8px}
.info-card-value{font-size:15px;font-weight:700}
.tags-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.tag{padding:6px 14px;border-radius:100px;font-size:12px;font-weight:600;border:1px solid rgba(3,105,161,.12);color:var(--cl-d);background:var(--cl-ll);transition:all .3s}
.tag:hover{background:var(--cl);color:white}

/* CTA */
.cs-cta{text-align:center;padding:80px 56px 100px;position:relative}
.cs-cta::before{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(55,80,247,.04),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%)}
.cs-cta h2{font-size:clamp(28px,4vw,44px);font-weight:700;letter-spacing:-.035em;margin-bottom:14px;position:relative}
.cs-cta p{font-size:17px;color:var(--black-m);margin-bottom:32px;max-width:460px;margin-left:auto;margin-right:auto;line-height:1.7;position:relative}
.cs-cta-btn{padding:18px 44px;background:var(--blue);color:var(--white);border:none;border-radius:100px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:all .4s;text-decoration:none;display:inline-block;position:relative}
.cs-cta-btn:hover{transform:translateY(-3px);box-shadow:0 20px 48px rgba(55,80,247,.22);background:var(--blue-d)}
.cs-cta-link{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--blue);text-decoration:none;margin-left:24px;transition:gap .3s}
.cs-cta-link:hover{gap:12px}

/* FOOTER */
.footer{border-top:1px solid rgba(55,80,247,.04);padding:56px 56px 40px;max-width:1200px;margin:0 auto}
.footer-top{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:32px;margin-bottom:48px}
.footer-brand{max-width:280px}
.footer-logo{font-size:20px;font-weight:700;color:var(--blue);letter-spacing:-.04em;margin-bottom:12px}
.footer-tagline{font-size:13px;color:var(--black-l);line-height:1.6;margin-bottom:20px}
.footer-contact-item{font-size:13px;color:var(--black-m);margin-bottom:8px;display:flex;align-items:center;gap:8px;text-decoration:none;transition:color .3s}
.footer-contact-item:hover{color:var(--blue)}
.footer-contact-item svg{width:14px;height:14px;opacity:.5;flex-shrink:0}
.footer-col h4{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--black-l);margin-bottom:16px}
.footer-col a{display:block;font-size:14px;font-weight:500;color:var(--black-m);text-decoration:none;margin-bottom:10px;transition:color .3s}
.footer-col a:hover{color:var(--blue)}
.footer-bottom{padding-top:24px;border-top:1px solid rgba(55,80,247,.04);font-size:12px;color:var(--black-l);font-weight:500;text-align:center}

/* REVEAL ANIMATIONS */
.rv{opacity:0;transform:translateY(30px);transition:opacity .8s cubic-bezier(.22,1,.36,1),transform .8s cubic-bezier(.22,1,.36,1)}
.rv.v{opacity:1;transform:translateY(0)}
.rv-scale{opacity:0;transform:scale(.95);transition:opacity .8s cubic-bezier(.22,1,.36,1),transform .8s cubic-bezier(.22,1,.36,1)}
.rv-scale.v{opacity:1;transform:scale(1)}
.rv-left{opacity:0;transform:translateX(-30px);transition:opacity .8s cubic-bezier(.22,1,.36,1),transform .8s cubic-bezier(.22,1,.36,1)}
.rv-left.v{opacity:1;transform:translateX(0)}
.rv-right{opacity:0;transform:translateX(30px);transition:opacity .8s cubic-bezier(.22,1,.36,1),transform .8s cubic-bezier(.22,1,.36,1)}
.rv-right.v{opacity:1;transform:translateX(0)}

/* HAMBURGER */
.nav-hamburger{display:none;background:none;border:none;cursor:pointer;padding:8px}
.nav-hamburger svg{width:24px;height:24px;stroke:var(--black);stroke-width:2;fill:none;stroke-linecap:round}
.mobile-menu{display:none;position:fixed;inset:0;z-index:999;background:rgba(255,255,255,.98);backdrop-filter:blur(24px);flex-direction:column;align-items:center;justify-content:center;gap:8px;opacity:0;pointer-events:none;transition:opacity .3s}
.mobile-menu.open{opacity:1;pointer-events:auto}
.mobile-menu a{font-size:20px;font-weight:600;color:var(--black-m);text-decoration:none;padding:14px 40px;border-radius:100px;transition:all .3s}
.mobile-menu a:hover,.mobile-menu a.active{color:var(--blue);background:rgba(55,80,247,.05)}
.mobile-menu .mobile-cta{margin-top:16px;padding:16px 40px;background:var(--blue);color:var(--white);border-radius:100px;font-size:16px;font-weight:700}
.mobile-close{position:absolute;top:20px;right:24px;background:none;border:none;cursor:pointer;padding:8px}
.mobile-close svg{width:24px;height:24px;stroke:var(--black);stroke-width:2;fill:none;stroke-linecap:round}
@media(max-width:768px){.nav-hamburger{display:block}.mobile-menu{display:flex}}

/* RESPONSIVE */
@media(max-width:1100px){
.nav{padding:0 32px}.cs-hero{padding:130px 32px 80px}
.kpi-strip,.section,.screenshot,.info-strip,.divider{padding-left:32px;padding-right:32px}
.kpi-grid{grid-template-columns:1fr 1fr}.strat-grid{grid-template-columns:1fr 1fr}
.results-grid{grid-template-columns:1fr 1fr}.channel-grid{grid-template-columns:1fr}
.cs-cta,.quote-section{padding-left:32px;padding-right:32px}
.footer{padding:40px 32px 32px}.footer-top{grid-template-columns:1fr 1fr}
.cs-hero-logo{display:none}
}
@media(max-width:768px){
.nav{padding:0 20px;height:64px}.nav-links{display:none}
.cs-hero{padding:100px 20px 64px;min-height:auto}
.kpi-strip,.section,.screenshot,.info-strip,.divider{padding-left:20px;padding-right:20px}
.kpi-grid{grid-template-columns:1fr 1fr}.strat-grid{grid-template-columns:1fr}
.results-grid{grid-template-columns:1fr}.ba-strip{grid-template-columns:1fr}.ba-arrow{padding:12px 0}
.cs-cta,.quote-section{padding-left:20px;padding-right:20px}
.footer{padding:32px 20px 24px}.footer-top{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel" data-type="module">
const{useState,useEffect,useRef}=React;

function useReveal(threshold=.08){
  const ref=useRef(null);const[vis,setVis]=useState(false);
  useEffect(()=>{const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVis(true);obs.unobserve(el)}},{threshold});
    obs.observe(el);return()=>obs.disconnect()},[]);
  return[ref,vis];
}

const Reveal=({children,delay=0,type="rv"})=>{const[ref,vis]=useReveal();return<div ref={ref} className={type+" "+(vis?"v":"")} style={{transitionDelay:delay+"s"}}>{children}</div>};

function AnimCounter({end,prefix="",suffix="",decimals=0,duration=2200}){
  const[val,setVal]=useState(0);const ref=useRef(null);const started=useRef(false);
  useEffect(()=>{const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting&&!started.current){started.current=true;
      const start=performance.now();const step=(now)=>{const p=Math.min((now-start)/duration,1);const eased=1-Math.pow(1-p,4);
      setVal(eased*end);if(p<1)requestAnimationFrame(step)};requestAnimationFrame(step);obs.unobserve(el)}},{threshold:.3});
    obs.observe(el);return()=>obs.disconnect()},[end,duration]);
  return<span ref={ref}>{prefix}{decimals>0?val.toFixed(decimals):Math.round(val).toLocaleString('it-IT')}{suffix}</span>}

// SVG Logos
const MetaLogo=()=><svg viewBox="0 0 100 20" height="22" fill="none"><text x="0" y="15" fontFamily="IBM Plex Sans" fontWeight="700" fontSize="16" fill="#1877F2">Meta</text><text x="38" y="15" fontFamily="IBM Plex Sans" fontWeight="500" fontSize="13" fill="#1877F2"> Ads</text></svg>;

      <Reveal delay={.06}><h2>Un e-commerce che spendeva senza strategia</h2></Reveal>
      <Reveal delay={.12}><p>Climando {"è"} un e-commerce specializzato in climatizzazione, riscaldamento ed elettrodomestici. Quando abbiamo preso in gestione l{"’"}account, il cliente era gi{"à"} in gestione presso un{"’"}altra agenzia.</p></Reveal>
      <Reveal delay={.16}><p>Il problema principale: <strong>spendevano le stesse cifre ogni mese senza tenere conto della stagionalit{"à"} dei prodotti</strong>. Nessuna clusterizzazione del catalogo, nessun forecast di spesa, nessuna strategia di remarketing strutturata. Budget costante su un business fortemente stagionale = soldi bruciati.</p></Reveal>
