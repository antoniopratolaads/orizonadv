<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>404 — Orizon ADV</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--blue:#3750F7;--black:#0C1713;--black-m:#5A625F;--white:#FFFFFF}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',sans-serif;color:var(--black);background:var(--white);display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px}
.c{max-width:480px}
.n{font-size:120px;font-weight:700;color:var(--blue);letter-spacing:-.06em;line-height:1;margin-bottom:16px;opacity:.15}
h1{font-size:28px;font-weight:700;letter-spacing:-.03em;margin-bottom:12px}
p{font-size:16px;color:var(--black-m);line-height:1.7;margin-bottom:32px}
a{display:inline-block;padding:14px 36px;background:var(--blue);color:var(--white);border-radius:100px;font-size:15px;font-weight:700;text-decoration:none;transition:all .3s}
a:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(55,80,247,.2)}
</style>
</head>
<body>
<div class="c">
<div class="n">404</div>
<h1>Pagina non trovata</h1>
<p>La pagina che cerchi non esiste o è stata spostata. Torna alla home per continuare.</p>
<a href="/index.html">Torna alla home →</a>
</div>
</body>
</html>
