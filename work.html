<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Orizon ADV — Work</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--blue:#3750F7;--blue-d:#233BD9;--blue-l:#6377FD;--blue-s:#9FABFF;--blue-ll:#D2D8FF;--green:#60E787;--green-d:#4CCB70;--green-l:#A1F9BA;--pink:#FEEAEE;--black:#0C1713;--black-m:#5A625F;--black-l:#A8ACAB;--black-ll:#D9D9D9;--gray:#F4F5F7;--white:#FFFFFF}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth;overflow-x:hidden;max-width:100vw}
body{font-family:'IBM Plex Sans',sans-serif;color:var(--black);background:var(--white);overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
::selection{background:var(--blue-ll);color:var(--blue-d)}

/* NAV */
.nav{position:fixed;top:0;left:0;width:100%;z-index:1000;padding:0 56px;height:72px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);background:rgba(255,255,255,.88);border-bottom:1px solid rgba(55,80,247,.05);transition:all .4s}
.nav.scrolled{box-shadow:0 1px 20px rgba(55,80,247,.04)}
.nav-logo{font-size:21px;font-weight:700;color:var(--blue);letter-spacing:-.04em;text-decoration:none}
.nav-links{display:flex;gap:8px;align-items:center}
.nav-link{padding:8px 18px;border-radius:100px;font-size:14px;font-weight:500;color:var(--black-m);text-decoration:none;transition:all .3s;border:1px solid transparent}
.nav-link:hover{color:var(--black);background:var(--gray)}
.nav-link.active{color:var(--blue);background:rgba(55,80,247,.05)}
.nav-cta{padding:9px 22px;border-radius:100px;font-size:14px;font-weight:600;color:var(--white);background:var(--blue);text-decoration:none;transition:all .35s;border:none;cursor:pointer;font-family:inherit}
.nav-cta:hover{background:var(--blue-d);transform:translateY(-1px);box-shadow:0 8px 24px rgba(55,80,247,.2)}

/* HERO */
.hero-bg{position:fixed;top:0;left:0;width:100%;height:100vh;pointer-events:none;z-index:0;overflow:hidden}
.hero-bg .orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.3;animation:orbFloat 25s ease-in-out infinite}
.hero-orb-1{width:500px;height:500px;background:rgba(55,80,247,.08);top:-150px;right:-80px}
.hero-orb-2{width:350px;height:350px;background:rgba(96,231,135,.1);bottom:0;left:-80px;animation-delay:-8s}
.hero-orb-3{width:400px;height:400px;background:rgba(55,80,247,.05);top:40%;left:30%;animation-delay:-16s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(30px,-20px) scale(1.05)}50%{transform:translate(-20px,30px) scale(.95)}75%{transform:translate(20px,20px) scale(1.02)}}
.hero-o-pattern{position:fixed;top:0;left:0;width:100%;height:100vh;pointer-events:none;z-index:0;overflow:hidden}
.hero-o-pattern .o-shape{position:absolute;animation:oFade 1.8s ease-out forwards;opacity:0}
@keyframes oFade{0%{opacity:0;transform:scale(.85)}100%{opacity:var(--o-op);transform:scale(1)}}
.hero{position:relative;z-index:1;padding:150px 56px 48px;max-width:1440px;margin:0 auto}
.hero-eyebrow{font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin-bottom:20px;display:flex;align-items:center;gap:14px}
.hero-eyebrow::before{content:'';width:36px;height:2px;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:1px}
.hero h1{font-size:clamp(36px,5vw,64px);font-weight:700;letter-spacing:-.045em;line-height:1.04;margin-bottom:20px;max-width:800px}
.hero h1 em{font-style:normal;background:linear-gradient(135deg,var(--blue),var(--blue-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-desc{font-size:18px;line-height:1.7;color:var(--black-m);max-width:560px}

/* MARQUEE LOGOS */
.marquee-section{padding:48px 0;border-top:1px solid rgba(55,80,247,.04);border-bottom:1px solid rgba(55,80,247,.04);overflow:hidden}
.marquee-label{text-align:center;font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--black-l);margin-bottom:28px}
.marquee-track{display:flex;animation:marquee 35s linear infinite;width:max-content}
.marquee-track:hover{animation-play-state:paused}
.marquee-item{padding:0 44px;font-size:18px;font-weight:700;color:var(--black-ll);letter-spacing:-.02em;white-space:nowrap;transition:color .3s;cursor:default;display:flex;align-items:center;gap:12px}
.marquee-item:hover{color:var(--black-m)}
.marquee-dot{width:6px;height:6px;border-radius:50%;background:var(--blue-ll);flex-shrink:0}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* STATS */
.stats{padding:48px 56px 64px;max-width:1440px;margin:0 auto}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.stat{padding:32px 28px;border-radius:20px;background:var(--black);position:relative;overflow:hidden;transition:transform .5s cubic-bezier(.22,1,.36,1),box-shadow .5s}
.stat:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.2)}
.stat::before{content:'';position:absolute;width:100px;height:100px;border-radius:50%;top:-30px;right:-30px;pointer-events:none}
.stat:nth-child(1)::before{background:radial-gradient(circle,rgba(55,80,247,.15),transparent 70%)}
.stat:nth-child(2)::before{background:radial-gradient(circle,rgba(96,231,135,.12),transparent 70%)}
.stat:nth-child(3)::before{background:radial-gradient(circle,rgba(99,119,253,.12),transparent 70%)}
.stat:nth-child(4)::before{background:radial-gradient(circle,rgba(96,231,135,.15),transparent 70%)}
.stat-value{font-size:clamp(28px,3vw,40px);font-weight:700;color:var(--white);letter-spacing:-.03em;margin-bottom:4px;position:relative}
.stat-value .accent{color:var(--green)}
.stat-label{font-size:12px;color:rgba(255,255,255,.4);font-weight:500;position:relative}

/* SECTION */
.section-eyebrow{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:12px}
.section-eyebrow::before{content:'';width:28px;height:2px;background:var(--green);border-radius:1px}
.section-title{font-size:clamp(28px,3.5vw,44px);font-weight:700;letter-spacing:-.035em;line-height:1.1;margin-bottom:16px}
.section-desc{font-size:17px;color:var(--black-m);line-height:1.7;max-width:520px;margin-bottom:48px}

/* DIVIDER */
.divider{max-width:1440px;margin:0 auto;padding:0 56px}
.divider-line{height:1px;background:linear-gradient(90deg,transparent,rgba(55,80,247,.07),transparent)}

/* FEATURED CASE STUDIES — GLASS OVERLAY */
.cases-featured{padding:80px 56px 48px;max-width:1440px;margin:0 auto}
.cases-grid-big{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.case-big{border-radius:24px;overflow:hidden;cursor:pointer;position:relative;height:420px;transition:all .6s cubic-bezier(.22,1,.36,1);text-decoration:none;color:var(--black);display:block}
.case-big:hover{transform:translateY(-5px);box-shadow:0 24px 64px rgba(0,0,0,.12)}
.case-visual{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;transition:transform .6s cubic-bezier(.22,1,.36,1)}
.case-big:hover .case-visual{transform:scale(1.04)}
.case-visual-name{font-size:34px;font-weight:700;letter-spacing:-.03em;position:relative;z-index:2}
.case-visual-sub{font-size:12px;font-weight:600;position:relative;z-index:2}
.case-gradient{position:absolute;inset:0;background:linear-gradient(180deg,transparent 25%,rgba(0,0,0,.7) 100%);z-index:1}
.case-glass{position:absolute;top:20px;right:20px;z-index:3;padding:10px 16px;border-radius:14px;background:rgba(255,255,255,.1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1)}
.case-glass-v{font-size:20px;font-weight:700;color:white}
.case-glass-l{font-size:9px;color:rgba(255,255,255,.6);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.case-body{position:absolute;bottom:0;left:0;right:0;padding:28px;z-index:2}
.case-head{margin-bottom:12px}
.case-brand{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:4px}
.case-cat{display:none}
.case-name-big{font-size:26px;font-weight:700;color:white;letter-spacing:-.02em;margin-bottom:12px}
.case-kpis-grid{display:flex;gap:20px;margin-bottom:12px}
.case-kpi{background:transparent;border-radius:0;padding:0}
.case-kpi-v{font-size:22px;font-weight:700;color:var(--green);letter-spacing:-.02em}
.case-kpi-l{font-size:9px;color:rgba(255,255,255,.5);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.case-tags{display:none}
.case-text{font-size:13px;color:rgba(255,255,255,.6);line-height:1.5;margin-bottom:14px;max-height:0;overflow:hidden;opacity:0;transition:all .5s cubic-bezier(.22,1,.36,1)}
.case-big:hover .case-text{max-height:60px;opacity:1}
.case-link{font-size:12px;font-weight:700;color:white;text-decoration:none;display:inline-flex;align-items:center;gap:6px;opacity:.7;transition:all .3s}
.case-link:hover{opacity:1;gap:10px}

/* COMPACT CASE GRID */
.cases-more{padding:20px 56px 80px;max-width:1440px;margin:0 auto}
.more-label{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--black-l);margin-bottom:20px}
.cases-grid-compact{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.case-compact{border-radius:20px;overflow:hidden;background:var(--gray);border:1px solid rgba(55,80,247,.03);transition:all .5s cubic-bezier(.22,1,.36,1);cursor:pointer;text-decoration:none;color:var(--black);display:block}
.case-compact:hover{border-color:var(--blue);box-shadow:0 12px 36px rgba(55,80,247,.07);transform:translateY(-3px)}
.case-compact-visual{height:140px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px}
.case-compact-visual-name{font-size:24px;font-weight:700;letter-spacing:-.02em}
.case-compact-visual-sub{font-size:11px;font-weight:600}
.case-compact-body{padding:22px 24px}
.case-compact-brand{font-size:16px;font-weight:700;margin-bottom:2px}
.case-compact-cat{font-size:11px;color:var(--black-l);font-weight:500;margin-bottom:12px}
.case-compact-kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.case-compact-kpi{background:var(--white);border-radius:10px;padding:10px 12px}
.case-compact-kpi-v{font-size:17px;font-weight:700;color:var(--green-d);letter-spacing:-.02em}
.case-compact-kpi-l{font-size:9px;color:var(--black-l);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-top:1px}
.case-compact-link{font-size:12px;font-weight:700;color:var(--blue);text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:gap .3s}
.case-compact-link:hover{gap:9px}

/* ALSO WORKED STRIP */
.also-strip{padding:0 56px 80px;max-width:1440px;margin:0 auto}
.also-inner{background:var(--gray);border-radius:20px;padding:32px 36px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.also-label{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--black-l);flex-shrink:0}
.also-names{display:flex;gap:10px;flex-wrap:wrap}
.also-name{padding:8px 18px;border-radius:100px;font-size:13px;font-weight:600;color:var(--black-m);border:1px solid var(--black-ll);background:var(--white);transition:all .3s}
.also-name:hover{border-color:var(--blue);color:var(--blue)}

/* CTA — GRADIENT GLASSMORPHISM */
.cta{position:relative;overflow:hidden;border-radius:28px;padding:80px 60px;text-align:center;background:linear-gradient(135deg,var(--blue),var(--blue-d))}
.cta::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 100 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40,0 L60,0 C82,0 100,18 100,40 C100,62 82,80 60,80 L40,80 C18,80 0,62 0,40 C0,18 18,0 40,0 Z M40,22 C30,22 22,30 22,40 C22,50 30,58 40,58 L60,58 C70,58 78,50 78,40 C78,30 70,22 60,22 L40,22 Z' fill='white' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");background-size:120px 96px;opacity:.6}
.cta::after{content:'';position:absolute;bottom:-200px;right:-100px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(96,231,135,.15),transparent 70%)}
.cta h2{font-size:clamp(30px,4vw,52px);font-weight:700;letter-spacing:-.04em;color:white;margin-bottom:16px;position:relative;z-index:1}
.cta>p{font-size:18px;color:rgba(255,255,255,.6);margin-bottom:36px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.7;position:relative;z-index:1}
.cta-glass{display:inline-flex;align-items:center;gap:24px;padding:10px 10px 10px 36px;border-radius:100px;background:rgba(255,255,255,.1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);position:relative;z-index:1}
.cta-glass span{font-size:15px;font-weight:600;color:rgba(255,255,255,.9)}
.cta-glass-btn{padding:14px 36px;background:white;color:var(--blue);border-radius:100px;font-size:15px;font-weight:700;text-decoration:none;transition:all .3s;display:inline-block}
.cta-glass-btn:hover{transform:scale(1.04);box-shadow:0 8px 24px rgba(0,0,0,.15)}
.cta-sub{margin-top:20px;font-size:13px;color:rgba(255,255,255,.35);position:relative;z-index:1}
.cta-btn{display:none}

/* FOOTER */
.footer{border-top:1px solid rgba(55,80,247,.04);padding:56px 56px 40px;max-width:1440px;margin:0 auto}
.footer-top{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:32px;margin-bottom:48px}
.footer-brand{max-width:280px}
.footer-logo{font-size:20px;font-weight:700;color:var(--blue);letter-spacing:-.04em;margin-bottom:12px}
.footer-tagline{font-size:13px;color:var(--black-l);line-height:1.6;margin-bottom:20px}
.footer-contact-item{font-size:13px;color:var(--black-m);margin-bottom:8px;display:flex;align-items:center;gap:8px;text-decoration:none;transition:color .3s}
.footer-contact-item:hover{color:var(--blue)}
.footer-contact-item svg{width:14px;height:14px;opacity:.5;flex-shrink:0}
.footer-col h4{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--black-l);margin-bottom:16px}
.footer-col a{display:block;font-size:14px;font-weight:500;color:var(--black-m);text-decoration:none;margin-bottom:10px;transition:color .3s}
.footer-col a:hover{color:var(--blue)}
.footer-bottom{padding-top:24px;border-top:1px solid rgba(55,80,247,.04);font-size:12px;color:var(--black-l);font-weight:500;text-align:center}

/* REVEAL */
.rv{opacity:0;transform:translateY(30px);transition:opacity .8s cubic-bezier(.22,1,.36,1),transform .8s cubic-bezier(.22,1,.36,1)}
.rv.v{opacity:1;transform:translateY(0)}

/* RESPONSIVE */
@media(max-width:1100px){
.nav{padding:0 32px}.hero{padding:130px 32px 40px}
.stats,.cases-featured,.cases-more,.also-strip,.cta{padding-left:32px;padding-right:32px}
.stats-grid{grid-template-columns:1fr 1fr}
.cases-grid-big{grid-template-columns:1fr}.cases-grid-compact{grid-template-columns:1fr 1fr}
.footer{padding:40px 32px 32px}.footer-top{grid-template-columns:1fr 1fr;gap:32px}
}
@media(max-width:768px){
.nav{padding:0 20px;height:64px}.nav-links{display:none}
.hero{padding:110px 20px 36px}
.stats,.cases-featured,.cases-more,.also-strip,.cta{padding-left:20px;padding-right:20px}
.stats-grid{grid-template-columns:1fr 1fr}.cases-grid-compact{grid-template-columns:1fr}
.also-inner{flex-direction:column;align-items:flex-start;gap:16px}
.footer{padding:32px 20px 24px}.footer-top{grid-template-columns:1fr;gap:28px}
.divider{padding:0 20px}
}

.nav-hamburger{display:none;background:none;border:none;cursor:pointer;padding:8px;z-index:1001}
.nav-hamburger svg{width:24px;height:24px;stroke:var(--black);stroke-width:2;fill:none;stroke-linecap:round}
.mobile-menu{display:none;position:fixed;inset:0;z-index:999;background:rgba(255,255,255,.98);backdrop-filter:blur(24px);flex-direction:column;align-items:center;justify-content:center;gap:8px;opacity:0;pointer-events:none;transition:opacity .3s}
.mobile-menu.open{opacity:1;pointer-events:auto}
.mobile-menu a{font-size:20px;font-weight:600;color:var(--black-m);text-decoration:none;padding:14px 40px;border-radius:100px;transition:all .3s}
.mobile-menu a:hover,.mobile-menu a.active{color:var(--blue);background:rgba(55,80,247,.05)}
.mobile-menu .mobile-cta{margin-top:16px;padding:16px 40px;background:var(--blue);color:var(--white);border-radius:100px;font-size:16px;font-weight:700}
.mobile-close{position:absolute;top:20px;right:24px;background:none;border:none;cursor:pointer;padding:8px}
.mobile-close svg{width:24px;height:24px;stroke:var(--black);stroke-width:2;fill:none;stroke-linecap:round}
@media(max-width:768px){.nav-hamburger{display:block}.mobile-menu{display:flex}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel" data-type="module">
const{useState,useEffect,useRef}=React;

const Reveal=({children,delay=0})=>{const ref=useRef(null);const[vis,setVis]=useState(false);useEffect(()=>{const el=ref.current;if(!el)return;const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVis(true);obs.unobserve(el)}},{threshold:.06});obs.observe(el);return()=>obs.disconnect()},[]);return<div ref={ref} className={"rv "+(vis?"v":"")} style={{transitionDelay:delay+"s"}}>{children}</div>};

function AnimCounter({end,prefix="",suffix="",duration=2000}){
  const[val,setVal]=useState(0);const ref=useRef(null);const started=useRef(false);
  useEffect(()=>{const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting&&!started.current){started.current=true;
      const start=performance.now();const step=(now)=>{const p=Math.min((now-start)/duration,1);const eased=1-Math.pow(1-p,3);
      setVal(Math.round(eased*end));if(p<1)requestAnimationFrame(step)};requestAnimationFrame(step);obs.unobserve(el)}},{threshold:.3});
    obs.observe(el);return()=>obs.disconnect()},[end,duration]);
  return<span ref={ref}>{prefix}{val.toLocaleString('it-IT')}{suffix}</span>}

const IconMail=()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 4 10 8 10-8"/></svg>;
const IconPhone=()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.86 19.86 0 0 1 3.09 5.18 2 2 0 0 1 5.08 3h3a2 2 0 0 1 2 1.72c.12.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 11.87a16 16 0 0 0 6.04 6.04l2.23-2.23a2 2 0 0 1 2.11-.45c.91.34 1.85.58 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
const IconPin=()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 6-9 13-9 13s-9-7-9-13a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>;

const marqueeClients=["Climando","Buytutto","L\u2019Arcolaio","Aste Online","Londonstore","VG Informatica","Manfrellotti","B-Power","De Matteo Home","F.lli Fontana"];

function App(){
  const[scrolled,setScrolled]=useState(false);
  useEffect(()=>{const fn=()=>setScrolled(window.scrollY>20);window.addEventListener("scroll",fn,{passive:true});return()=>window.removeEventListener("scroll",fn)},[]);

  return<React.Fragment>

    {/* NAV */}
    <nav className={"nav"+(scrolled?" scrolled":"")}>
      <a className="nav-logo" href="/">orizon</a>
      <div className="nav-links">
        <a className="nav-link" href="/index.html">Home</a>
        <a className="nav-link" href="/servizi.html">Servizi</a>
        <a className="nav-link active" href="/work.html">Work</a>
        <a className="nav-link" href="/contatti.html">Contatti</a>
        <a className="nav-cta" href="/contatti">Parliamone</a>
      </div>
    </nav>

    {/* HERO */}
    <div className="hero-bg" aria-hidden="true">
      <div className="orb hero-orb-1"/>
      <div className="orb hero-orb-2"/>
